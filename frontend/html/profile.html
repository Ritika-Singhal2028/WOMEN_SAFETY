<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ResQHer — My Profile</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --pink: #ae51a5;
      --purple: #852fc7;
      --dark-purple: #6a1b9a;
      --bg: #f5eefa;
      --card: #ffffff;
      --text: #29102b;
      --text2: #120404;
      --border: rgba(155,39,175,0.12);
      --shadow: 0 8px 32px rgba(119, 34, 143, 0.13);
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #f5e6fa 0%, #ede0f7 60%, #dcc8f0 100%);
      min-height: 100vh;
      padding-bottom: 2rem;
    }

    /* TOP BAR */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 1.25rem;
      background: white;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .back-btn {
      background: none;
      border: none;
      font-size: 1rem;
      color: var(--purple);
      cursor: pointer;
      padding: 0.3rem 0.6rem;
      border-radius: 8px;
      transition: background 0.15s;
      font-family: 'Poppins', sans-serif;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }
    .back-btn:hover { background: #f5eefa; }

    .brand {
      font-size: 1.2rem;
      font-weight: 700;
      background: linear-gradient(90deg, var(--pink), var(--purple));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .logout-btn {
      background: #fce4f5;
      border: none;
      padding: 0.38rem 1rem;
      border-radius: 20px;
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--pink);
      cursor: pointer;
      font-family: 'Poppins', sans-serif;
      transition: transform 0.15s;
    }
    .logout-btn:hover { transform: scale(1.04); }

    /* LOADING */
    .loading-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 60vh;
      gap: 1rem;
      color: var(--text2);
      font-size: 0.9rem;
    }

    .spinner {
      width: 44px; height: 44px;
      border: 3px solid #e4c8f0;
      border-top-color: var(--pink);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* PROFILE */
    .profile-content { display: none; }

    .cover-wrap {
      position: relative;
      height: 170px;
      background: linear-gradient(135deg, var(--pink), var(--purple), var(--dark-purple));
      margin: 1.25rem 1.25rem 0;
      border-radius: 20px 20px 0 0;
    }

    .avatar-ring {
      position: absolute;
      bottom: 44px;
      left: 50%;
      transform: translateX(-50%);
      width: 92px; height: 92px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--pink), var(--purple));
      padding: 3px;
      border: 4px solid var(--bg);
    }

    .avatar-inner {
      width: 100%; height: 100%;
      border-radius: 50%;
      background: linear-gradient(135deg, #ae8b96, var(--pink));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      font-weight: 700;
      color: white;
    }

    .profile-card {
      background: var(--card);
      margin: 0 1.25rem;
      border-radius: 0 0 20px 20px;
      padding: 3.5rem 1.5rem 1.75rem;
      box-shadow: var(--shadow);
    }

    .user-name {
      text-align: center;
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 0.2rem;
    }

    .user-sub {
      text-align: center;
      font-size: 0.76rem;
      color: var(--text2);
      margin-bottom: 1.5rem;
    }

    .edit-btn {
      display: block;
      width: 100%;
      padding: 0.72rem;
      background: linear-gradient(90deg, var(--pink), var(--purple));
      color: white;
      border: none;
      border-radius: 12px;
      font-family: 'Poppins', sans-serif;
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 1.75rem;
      transition: opacity 0.2s, transform 0.1s;
    }
    .edit-btn:hover { opacity: 0.88; }
    .edit-btn:active { transform: scale(0.98); }

    .sec-label {
      font-size: 0.68rem;
      font-weight: 700;
      color: var(--pink);
      letter-spacing: 1.3px;
      text-transform: uppercase;
      margin-bottom: 0.6rem;
      padding-bottom: 0.4rem;
      border-bottom: 1.5px solid #f9e4f4;
    }

    .info-group { margin-bottom: 1.5rem; }

    .info-row {
      display: flex;
      align-items: flex-start;
      gap: 0.85rem;
      padding: 0.72rem 0;
      border-bottom: 1px solid #f5eef8;
    }
    .info-row:last-child { border-bottom: none; }

    .info-icon {
      width: 36px; height: 36px; min-width: 36px;
      border-radius: 10px;
      background: #f9e4f4;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--pink);
      font-size: 0.88rem;
    }

    .info-lbl {
      font-size: 0.68rem;
      font-weight: 600;
      color: var(--text2);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 2px;
    }

    .info-val {
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--text);
      word-break: break-word;
    }

    .info-val.masked {
      letter-spacing: 4px;
      color: var(--purple);
      font-size: 1rem;
    }

    /* Emergency contact chips */
    .contact-chip {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      background: #faf4fe;
      border: 1px solid #ead6f7;
      border-radius: 10px;
      padding: 0.6rem 0.9rem;
      margin-bottom: 0.5rem;
    }

    .chip-icon {
      width: 32px; height: 32px;
      border-radius: 8px;
      background: linear-gradient(135deg, var(--pink), var(--purple));
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 0.78rem;
      flex-shrink: 0;
    }

    .chip-name { font-size: 0.85rem; font-weight: 600; color: var(--text); }
    .chip-phone { font-size: 0.74rem; color: var(--text2); }

    /* Fake call number pills */
    .fake-chip {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      background: #f9e4f4;
      border-radius: 20px;
      padding: 0.32rem 0.85rem;
      margin: 0.25rem 0.25rem 0.25rem 0;
      font-size: 0.78rem;
      font-weight: 500;
      color: var(--dark-purple);
    }

    .no-data {
      font-size: 0.82rem;
      color: var(--text2);
      font-style: italic;
    }

    /* EDIT MODAL */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(60,20,80,0.5);
      z-index: 999;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .overlay.open { display: flex; }

    .modal {
      background: white;
      border-radius: 20px;
      width: 100%;
      max-width: 430px;
      padding: 1.75rem;
      max-height: 88vh;
      overflow-y: auto;
      box-shadow: 0 16px 64px rgba(100,30,130,0.25);
      animation: popIn 0.2s ease;
    }
    @keyframes popIn {
      from { transform: scale(0.93); opacity: 0; }
      to   { transform: scale(1); opacity: 1; }
    }

    .modal h3 { font-size: 1.05rem; font-weight: 700; color: var(--text); margin-bottom: 1.2rem; }

    .field { margin-bottom: 0.9rem; }
    .field label { font-size: 0.75rem; font-weight: 600; color: var(--purple); display: block; margin-bottom: 0.3rem; }
    .field input, .field textarea {
      width: 100%;
      padding: 0.62rem 0.9rem;
      border: 1.5px solid #e4c8f0;
      border-radius: 10px;
      font-family: 'Poppins', sans-serif;
      font-size: 0.88rem;
      color: var(--text);
      outline: none;
      resize: none;
      transition: border-color 0.2s;
    }
    .field input:focus, .field textarea:focus { border-color: var(--pink); }

    .modal-btns { display: flex; gap: 0.75rem; margin-top: 1.25rem; }
    .m-cancel {
      flex: 1; padding: 0.7rem;
      border: 1.5px solid #e4c8f0;
      background: white; border-radius: 10px;
      font-family: 'Poppins', sans-serif;
      font-size: 0.86rem; font-weight: 600;
      color: var(--purple); cursor: pointer;
    }
    .m-save {
      flex: 1; padding: 0.7rem;
      background: linear-gradient(90deg, var(--pink), var(--purple));
      border: none; border-radius: 10px;
      font-family: 'Poppins', sans-serif;
      font-size: 0.86rem; font-weight: 600;
      color: white; cursor: pointer;
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 1.5rem; left: 50%;
      transform: translateX(-50%) translateY(16px);
      background: #623e82;
      color: white;
      padding: 0.62rem 1.4rem;
      border-radius: 24px;
      font-size: 0.8rem; font-weight: 500;
      opacity: 0; pointer-events: none;
      transition: all 0.28s ease;
      z-index: 9999;
      white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    .fade-up { animation: fadeUp 0.4s ease both; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* 🌙 DARK THEME VARIABLES */
body.dark {
  --bg: #1a0f1f;
  --card: #2a1830;
  --text: #f5eefa;
  --text2: #d1b3d6;
  --border: rgba(255,255,255,0.08);
}

/* 🌙 APPLY DARK MODE */
body.dark {
  background: linear-gradient(135deg, #1a0f1f, #2a1830);
}

body.dark .topbar {
  background: #2a1830;
  border-bottom: 1px solid var(--border);
}

body.dark .profile-card {
  background: var(--card);
}

body.dark .info-icon {
  background: #3a2242;
}

body.dark .contact-chip {
  background: #2a1830;
  border-color: #3a2242;
}

body.dark .fake-chip {
  background: #3a2242;
}

body.dark .modal {
  background: #2a1830;
}

body.dark input,
body.dark textarea {
  background: #1a0f1f;
  color: white;
  border-color: #3a2242;
}

body.dark .loading-screen {
  color: white;
}

  </style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <button class="back-btn" onclick="window.location.href='index.html'">
    <i class="fa-solid fa-arrow-left"></i> Home
  </button>

  <div class="brand">ResQHer</div>

  <!-- RIGHT SIDE CONTROLS -->
  <div style="display:flex;align-items:center;gap:10px;">
    
    <!-- 🌙 DARK MODE TOGGLE -->
    <label style="display:flex;align-items:center;gap:6px;cursor:pointer;">
      <input type="checkbox" id="toggleTheme">
      🌙
    </label>

    <button class="logout-btn" onclick="logoutUser()">Log Out</button>

  </div>
</div>

<!-- LOADING STATE -->
<div class="loading-screen" id="loadingScreen">
  <div class="spinner"></div>
  <span>Loading your profile…</span>
</div>

<!-- PROFILE (shown after data loads) -->
<div class="profile-content" id="profileContent">

  <div class="cover-wrap fade-up">
    <div class="avatar-ring">
      <div class="avatar-inner" id="avatarInitials">??</div>
    </div>
  </div>

  <div class="profile-card fade-up" style="animation-delay:0.08s">
    <div class="user-name" id="dispName">Loading…</div>
    <div class="user-sub" id="dispSub">ResQHer Member</div>

    <button class="edit-btn" onclick="openModal()">
      <i class="fa-solid fa-pen-to-square"></i>&nbsp; Edit Profile
    </button>

    <!-- Personal Details -->
    <div class="sec-label">Personal Details</div>
    <div class="info-group">
      <div class="info-row">
        <div class="info-icon"><i class="fa-solid fa-user"></i></div>
        <div>
          <div class="info-lbl">Username</div>
          <div class="info-val" id="pUsername">—</div>
        </div>
      </div>
      <div class="info-row">
        <div class="info-icon"><i class="fa-solid fa-phone"></i></div>
        <div>
          <div class="info-lbl">Phone Number</div>
          <div class="info-val" id="pPhone">—</div>
        </div>
      </div>
      <div class="info-row">
        <div class="info-icon"><i class="fa-solid fa-cake-candles"></i></div>
        <div>
          <div class="info-lbl">Date of Birth</div>
          <div class="info-val" id="pDob">—</div>
        </div>
      </div>
      <div class="info-row">
        <div class="info-icon"><i class="fa-solid fa-location-dot"></i></div>
        <div>
          <div class="info-lbl">Address</div>
          <div class="info-val" id="pAddress">—</div>
        </div>
      </div>
      <div class="info-row">
        <div class="info-icon"><i class="fa-solid fa-envelope"></i></div>
        <div>
          <div class="info-lbl">Email</div>
          <div class="info-val" id="pEmail">—</div>
        </div>
      </div>
      <div class="info-row">
        <div class="info-icon"><i class="fa-solid fa-lock"></i></div>
        <div>
          <div class="info-lbl">Password</div>
          <div class="info-val masked">••••••••</div>
        </div>
      </div>
    </div>

    <!-- Emergency Contacts
    <div class="sec-label">Emergency Contacts</div>
    <div class="info-group" id="emergencySection">
      <div class="no-data">No contacts added.</div>
    </div>

    Fake Call Numbers
    <div class="sec-label">Trusted Numbers (Fake Call)</div>
    <div class="info-group" id="fakeCallSection">
      <div class="no-data">No numbers added.</div>
    </div> -->

    <p style="text-align:center;font-size:0.7rem;color:var(--text2);margin-top:0.5rem;">
      🛡️ Join ResQHer and stay safe, always.
    </p>
  </div>
</div>

<!-- EDIT MODAL -->
<div class="overlay" id="editOverlay">
  <div class="modal">
    <h3><i class="fa-solid fa-pen"></i> Edit Profile</h3>
    <div class="field">
      <label>Username *</label>
      <input type="text" id="eUsername" placeholder="Username"/>
    </div>
    <div class="field">
      <label>Phone Number *</label>
      <input type="tel" id="ePhone" placeholder="+91 9876543210"/>
    </div>
    <div class="field">
      <label>Date of Birth</label>
      <input type="date" id="eDob"/>
    </div>
    <div class="field">
      <label>Address</label>
      <textarea id="eAddress" rows="3" placeholder="Your full address"></textarea>
    </div>
    <div class="modal-btns">
      <button class="m-cancel" onclick="closeModal()">Cancel</button>
      <button class="m-save" onclick="saveEdit()">Save Changes</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- Firebase (same versions as your project) -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<script src="/backend/firebase.js"></script>
<script src="/frontend/js/app.js"></script>

<script>
  // ── Auth guard: redirect to login if not signed in ──────────────
  auth.onAuthStateChanged(function(user) {
    if (!user) {
      window.location.href = 'login.html';
      return;
    }
    loadProfile(user);
  });

  // ── Fetch user data from Firebase Realtime Database ─────────────
  function loadProfile(user) {
    database.ref('users/' + user.uid).once('value')
      .then(snap => {
        const d = snap.val() || {};

        // Personal fields
        const username = d.username || '—';
        const phone    = d.phone    || '—';
        const email    = d.email    || user.email || '—';
        const address  = d.address  || '—';

        // Format DOB
        let dobDisplay = '—';
        if (d.dob) {
          const dt = new Date(d.dob);
          dobDisplay = dt.toLocaleDateString('en-IN', { day: 'numeric', month: 'long', year: 'numeric' });
        }

        // Avatar initials (first 2 letters of username)
        function getInitials(name) {
  if (!name) return "??";

  const words = name.trim().split(" ");

  if (words.length === 1) {
    return words[0][0].toUpperCase();
  }

  return (words[0][0] + words[1][0]).toUpperCase();
}

const initials = getInitials(username);

        // ── Update DOM ──
        document.getElementById('avatarInitials').textContent = initials;
        document.getElementById('dispName').textContent       = username;
        document.getElementById('dispSub').textContent        = '@' + username.toLowerCase().replace(/\s+/g,'') + ' · ResQHer Member';
        document.getElementById('pUsername').textContent      = username;
        document.getElementById('pPhone').textContent         = phone;
        document.getElementById('pDob').textContent           = dobDisplay;
        document.getElementById('pAddress').textContent       = address;
        document.getElementById('pEmail').textContent         = email;

        // Pre-fill edit modal
        document.getElementById('eUsername').value = d.username || '';
        document.getElementById('ePhone').value    = d.phone    || '';
        document.getElementById('eDob').value      = d.dob      || '';
        document.getElementById('eAddress').value  = d.address  || '';

        // Show profile
        document.getElementById('loadingScreen').style.display  = 'none';
        document.getElementById('profileContent').style.display = 'block';
      })
      .catch(err => {
        showToast('Error: ' + err.message);
        document.getElementById('loadingScreen').style.display  = 'none';
        document.getElementById('profileContent').style.display = 'block';
      });
  }

  // ── Save edits back to Firebase ──────────────────────────────────
  function saveEdit() {
    const user = auth.currentUser;
    if (!user) return;

    const username = document.getElementById('eUsername').value.trim();
    const phone    = document.getElementById('ePhone').value.trim();
    const dob      = document.getElementById('eDob').value;
    const address  = document.getElementById('eAddress').value.trim();

    if (!username || !phone) {
      showToast('Username and phone are required.');
      return;
    }

    database.ref('users/' + user.uid).update({ username, phone, dob, address })
      .then(() => {
        closeModal();
        showToast('Profile updated successfully ✓');
        loadProfile(user);
      })
      .catch(err => showToast('Update failed: ' + err.message));
  }

  // ── Modal ──────────────────────────────────────────────────────
  function openModal()  { document.getElementById('editOverlay').classList.add('open'); }
  function closeModal() { document.getElementById('editOverlay').classList.remove('open'); }
  document.getElementById('editOverlay').addEventListener('click', e => {
    if (e.target === document.getElementById('editOverlay')) closeModal();
  });

  // ── Logout ────────────────────────────────────────────────────
  function logoutUser() {
    auth.signOut().then(() => window.location.href = 'login.html');
  }

  // ── Helpers ───────────────────────────────────────────────────
  function escHtml(str) {
    const d = document.createElement('div');
    d.appendChild(document.createTextNode(str || ''));
    return d.innerHTML;
  }

  let _tt;
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(_tt);
    _tt = setTimeout(() => t.classList.remove('show'), 2600);
  }
</script>
</body>
</html>
